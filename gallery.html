<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gallery | EverSeasons</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="brand" href="index.html">
          <img class="brand-logo" src="everseasonslogo.jpg" alt="EverSeasons" />
        </a>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="nav-links" id="mobile-menu" aria-label="Primary">
          <a href="index.html#home">Home</a>
          <a href="index.html#about">About</a>
          <a href="index.html#services">Services</a>
          <a href="gallery.html" class="active">Gallery</a>
          <a href="index.html#faq">FAQs</a>
          <a href="index.html#contact">Contact</a>
        </nav>

        <div class="nav-actions">
          <a class="icon-btn" href="index.html#contact" aria-label="Search">
            <span class="icon">⌕</span>
          </a>
          <a class="btn btn-gold" href="index.html#contact">BOOKING</a>
        </div>
      </div>
    </header>

    <main class="section section-dark" style="padding-top: 140px;">
      <div class="container">
        <p class="eyebrow">Our Work</p>
        <h1 class="section-title" style="text-transform: uppercase;">Gallery</h1>
        <p class="muted" style="max-width: 720px;">
          Before/after projects across window cleaning, gutter cleaning, pressure washing, deck staining, and more.
        </p>

        <div class="gallery-grid">
          <figure class="work-card">
            <video class="work-video" autoplay muted loop playsinline>
              <source src="Untitled design (1).mp4" type="video/mp4" />
            </video>
            <figcaption>Window Cleaning</figcaption>
          </figure>

          <figure class="work-card">
            <img src="Screen Shot 2026-03-04 at 2.43.16 AM.png" alt="Gutter Cleaning Project" />
            <figcaption>Gutter Cleaning</figcaption>
          </figure>

          <figure class="work-card">
            <video class="work-video" autoplay muted loop playsinline>
              <source src="pressurewash.mp4" type="video/mp4" />
            </video>
            <figcaption>Pressure Washing</figcaption>
          </figure>

          <figure class="work-card">
            <img src="hero.jpg" alt="Seasonal Maintenance Project" />
            <figcaption>Seasonal Maintenance</figcaption>
          </figure>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <div class="footer-brand">© <span id="year"></span> EverSeasons.</div>
        <div class="muted">Home Maintenance</div>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const yearEl = document.getElementById("year");
        const header = document.querySelector(".site-header");
        const menuToggle = document.querySelector(".menu-toggle");
        const navLinks = document.querySelector(".nav-links");

        if (yearEl) {
          yearEl.textContent = new Date().getFullYear();
        }

        function handleScroll() {
          if (!header) return;

          if (window.scrollY > 80) {
            header.classList.add("scrolled");
          } else {
            header.classList.remove("scrolled");
          }
        }

        handleScroll();
        window.addEventListener("scroll", handleScroll);

        if (menuToggle && navLinks) {
          menuToggle.addEventListener("click", function (e) {
            e.stopPropagation();
            menuToggle.classList.toggle("active");
            navLinks.classList.toggle("open");

            const expanded = menuToggle.classList.contains("active");
            menuToggle.setAttribute("aria-expanded", expanded ? "true" : "false");
          });

          navLinks.querySelectorAll("a").forEach(function (link) {
            link.addEventListener("click", function () {
              menuToggle.classList.remove("active");
              navLinks.classList.remove("open");
              menuToggle.setAttribute("aria-expanded", "false");
            });
          });

          document.addEventListener("click", function (e) {
            if (!menuToggle.contains(e.target) && !navLinks.contains(e.target)) {
              menuToggle.classList.remove("active");
              navLinks.classList.remove("open");
              menuToggle.setAttribute("aria-expanded", "false");
            }
          });
        }
      });
    </script>
  </body>
</html>
